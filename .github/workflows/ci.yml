name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  test:
    # Windows-only crate; there is nothing meaningful to build elsewhere.
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, "1.82"]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2

      - name: Format
        if: matrix.toolchain == 'stable'
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --all-targets

      - name: Doc tests
        run: cargo test --doc

      # These drive the real clipboard rather than a mock, which is the point of them.
      # They need no window and no focus, so they are safe on a headless runner.
      - name: Clipboard privacy formats attach
        run: cargo run --example clipboard_privacy

      - name: No clipboard watcher forges a read confirmation
        run: cargo run --example watcher_probe

      - name: Docs build without warnings
        if: matrix.toolchain == 'stable'
        run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  publish-dry-run:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo publish --dry-run
